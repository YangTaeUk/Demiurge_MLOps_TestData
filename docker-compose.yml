services:
  # ── RDBMS ──

  postgres:
    image: postgres:16-alpine
    ports:
      - "${PG_PORT:-5434}:5432"
    environment:
      POSTGRES_USER: testdata
      POSTGRES_PASSWORD: testdata_dev
      POSTGRES_DB: testdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testdata"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - testdata

  mysql:
    image: mysql:8.0
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: testdata_root
      MYSQL_USER: testdata
      MYSQL_PASSWORD: testdata_dev
      MYSQL_DATABASE: testdata
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "testdata", "-ptestdata_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - testdata

  mariadb:
    image: mariadb:10.11
    ports:
      - "${MARIADB_PORT:-3307}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: testdata_root
      MARIADB_USER: testdata
      MARIADB_PASSWORD: testdata_dev
      MARIADB_DATABASE: testdata
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - testdata

  # ── NoSQL ──

  mongodb:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: testdata
      MONGO_INITDB_ROOT_PASSWORD: testdata_dev
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - testdata

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    ports:
      - "${ES_PORT:-9200}:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - testdata

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - testdata

  # ── Streaming ──

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    ports:
      - "${ZK_PORT:-2181}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - testdata

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://${KAFKA_HOST:-127.0.0.1}:${KAFKA_PORT:-9092},PLAINTEXT_INTERNAL://kafka:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - testdata

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: testdata
      RABBITMQ_DEFAULT_PASS: testdata_dev
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - testdata

  nats:
    image: nats:2-alpine
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MON_PORT:-8222}:8222"
    command: ["--jetstream", "--store_dir", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - testdata

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - ./configs/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testdata

  # ── Storage ──

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-testdata}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-testdata_dev_password}"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - testdata

  # ── File Transfer ──

  ftp:
    image: fauria/vsftpd
    ports:
      - "${FTP_PORT:-21}:21"
      - "${FTP_PASV_MIN:-21100}-${FTP_PASV_MAX:-21110}:21100-21110"
    environment:
      FTP_USER: testdata
      FTP_PASS: testdata_dev
      PASV_ADDRESS: "${FTP_PASV_ADDRESS:-127.0.0.1}"
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
    volumes:
      - ftp_data:/home/vsftpd/testdata
    healthcheck:
      test: ["CMD-SHELL", "curl -sf ftp://localhost:21/ --user testdata:testdata_dev || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testdata

  sftp:
    image: atmoz/sftp
    ports:
      - "${SFTP_PORT:-2222}:22"
    volumes:
      - sftp_data:/home/testdata/data
    entrypoint: /bin/sh
    command:
      - -c
      - |
        chown 1001:1001 /home/testdata/data
        exec /entrypoint testdata:testdata_dev:1001::data
    healthcheck:
      test: ["CMD-SHELL", "ssh-keyscan -p 22 localhost > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - testdata

volumes:
  postgres_data:
  mysql_data:
  mariadb_data:
  mongo_data:
  es_data:
  redis_data:
  zk_data:
  kafka_data:
  rabbitmq_data:
  nats_data:
  mosquitto_data:
  minio_data:
  ftp_data:
  sftp_data:

# ── Network ──
# DL 프로젝트에서 이 네트워크에 연결하려면:
#   networks:
#     testdata-ext:
#       external: true
#       name: demiurge-testdata-net
#
# 이후 DL 서비스에서 testdata-ext 네트워크를 추가하면
# postgres, kafka 등 서비스명으로 직접 접근 가능.
networks:
  testdata:
    name: demiurge-testdata-net
    driver: bridge
